<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>t m</title>
<style>
  :root {
    --navy: #1b2a4e;
    --text: #1a1a1a;
    --muted: #8a8f98;
    --line: #ececec;
    --bg: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  header {
    text-align: center;
    padding: 48px 20px 32px;
    border-bottom: 1px solid var(--line);
  }
  header .brand {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 4px;
    color: var(--navy);
  }

  main {
    max-width: 620px;
    margin: 0 auto;
    padding: 40px 20px 120px;
  }

  /* 글쓰기 박스 */
  .composer {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 48px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.03);
  }
  .composer input,
  .composer textarea {
    width: 100%;
    border: none;
    outline: none;
    font-family: inherit;
    color: var(--text);
    background: transparent;
    resize: none;
  }
  .composer input.title {
    font-size: 1.15rem;
    font-weight: 700;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 12px;
  }
  .composer textarea.body {
    font-size: 0.98rem;
    min-height: 90px;
    line-height: 1.7;
  }
  .composer .actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }
  .add-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--navy);
    color: #fff;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  .add-btn:hover { opacity: 0.88; }
  .add-btn .plus { font-size: 1.1rem; line-height: 1; }

  /* 게시글 */
  .post {
    border-bottom: 1px solid var(--line);
    padding: 26px 0;
  }
  .post:last-child { border-bottom: none; }
  .post h2 {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .post .time {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .post .content {
    font-size: 0.98rem;
    white-space: pre-line;
    color: #2b2b2b;
  }
  .post .del {
    float: right;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
  }
  .post .del:hover { color: #c0392b; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.92rem;
    padding: 30px 0;
  }

  footer {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--line);
  }
</style>
</head>
<body>

<header>
  <div class="brand">t m</div>
</header>

<main>
  <div class="composer">
    <input class="title" id="title" type="text" placeholder="제목">
    <textarea class="body" id="body" placeholder="오늘의 기록을 남겨보세요..."></textarea>
    <div class="actions">
      <button class="add-btn" id="add"><span class="plus">+</span> 올리기</button>
    </div>
  </div>

  <div id="posts"></div>
</main>

<footer>© <span id="year"></span> Yunju Han</footer>

<script>
  const KEY = 'tm_posts';
  const $ = (id) => document.getElementById(id);
  $('year').textContent = new Date().getFullYear();

  const load = () => JSON.parse(localStorage.getItem(KEY) || '[]');
  const save = (arr) => localStorage.setItem(KEY, JSON.stringify(arr));

  function fmt(ts) {
    const d = new Date(ts);
    const p = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function esc(s) {
    return s.replace(/[&<>]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  function render() {
    const posts = load().sort((a, b) => b.ts - a.ts);
    const el = $('posts');
    if (!posts.length) {
      el.innerHTML = '<div class="empty">아직 글이 없어요. 첫 글을 남겨보세요.</div>';
      return;
    }
    el.innerHTML = posts.map((p) => `
      <article class="post">
        <button class="del" data-id="${p.ts}">삭제</button>
        <h2>${esc(p.title)}</h2>
        <div class="time">${fmt(p.ts)}</div>
        <div class="content">${esc(p.content)}</div>
      </article>
    `).join('');
    el.querySelectorAll('.del').forEach((b) => {
      b.addEventListener('click', () => {
        save(load().filter((p) => p.ts != b.dataset.id));
        render();
      });
    });
  }

  $('add').addEventListener('click', () => {
    const title = $('title').value.trim();
    const content = $('body').value.trim();
    if (!title && !content) return;
    const posts = load();
    posts.push({ ts: Date.now(), title: title || '(제목 없음)', content });
    save(posts);
    $('title').value = '';
    $('body').value = '';
    render();
  });

  render();
</script>
</body>
</html>
